<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript基础知识</title>
</head>
<body>
    <h1>JavaScript基础知识练习</h1>
    <script>
        // 变量的定义
        var name = "Alice";
        let age = 30;
        const PI = 3.14;

        console.log("Age:", age);
        console.log("PI:", PI);
    </script>
